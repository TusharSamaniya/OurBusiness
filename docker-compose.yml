services:
  db:
    image: postgres:16-alpine
    container_name: agency_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agency_user
      POSTGRES_PASSWORD: agency_pass
      POSTGRES_DB: agency_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agency_user -d agency_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agency_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agency.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
